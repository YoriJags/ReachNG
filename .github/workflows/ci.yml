name: CI

# Test gate for ReachNG. Runs the full pytest suite on every push and PR to
# main. Railway auto-deploys from main, so this is the guard that stops a red
# commit from shipping. The DB-dependent isolation probes are skipped here
# (RUN_DB_TESTS unset) and run separately where a real Mongo is available.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # config.Settings requires ANTHROPIC_API_KEY + MONGODB_URI just to import the
    # app. These are throwaway values so the app boots; no test makes a real
    # Anthropic call, and DB-touching tests are skipped (RUN_DB_TESTS unset).
    env:
      ANTHROPIC_API_KEY: "sk-ant-ci-not-a-real-key"
      MONGODB_URI: "mongodb://localhost:27017/reachng_ci"
      APP_ENV: "test"
      SCHEDULER_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q
